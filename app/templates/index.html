<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reasoning AI</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css"
    />

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-dot"></span>
          <div class="brand-text">
            <div class="brand-title">Reasoning AI</div>
            <div class="brand-subtitle">llama.cpp powered reasoning</div>
          </div>
        </div>
        <button class="ghost" id="clearBtn" type="button">Clear</button>
      </header>

      <main class="chat">
        <div
          id="chatList"
          class="chat-list"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
        ></div>
      </main>

      <footer class="composer">
        <form id="chatForm" class="composer-inner" autocomplete="off">
          <textarea
            id="promptInput"
            rows="1"
            placeholder="Message Reasoning AI..."
            aria-label="Message input"
          ></textarea>
          <button id="sendBtn" type="submit" class="send">
            <span class="send-text">Send</span>
            <span class="send-icon">&rarr;</span>
          </button>
        </form>
        <div class="composer-hint">Enter to send, Shift+Enter for a new line</div>
      </footer>
    </div>

    <noscript>
      This app requires JavaScript to run.
    </noscript>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/marked@13.0.2/marked.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
    ></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <script defer src="/static/app.js"></script>
  </body>
</html>
